<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Twitch Chat</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <dialog id="modal">
      <div id="modal-elements"></div>
      <button id="close-modal">Close</button>
    </dialog>
    <div id="chat-container"></div>
    <div id="error-message" class="hidden"></div>
    <div id="buttons">
      <button id="close-socket">STOP</button>
      <button id="clear-button">CLEAR</button>
      <button id="leave-all" class="hidden">LEAVE ALL</button>
    </div>
    <input id="channel-input" placeholder="!commands - Ctrl+M to show/hide UI">
    <button id="reconnect-button" class="hidden">Reconnect</button>
    <button id="jump-to-bottom" class="hidden">&#8595;</button>
    <script src="webview/config.js"></script>
    <script src="webview/state.js"></script>
    <script src="webview/utils.js"></script>
    <script src="webview/main.js"></script>
  </body>
</html>
